      <stop offset="50%" stop-color="#4361ee"/>
      <stop offset="100%" stop-color="#3a0ca3"/>
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  
  <!-- Neural network nodes -->
  <circle cx="200" cy="150" r="8" fill="url(#neural)"/>
  <circle cx="350" cy="100" r="8" fill="url(#neural)"/>
  <circle cx="500" cy="180" r="8" fill="url(#neural)"/>
  <circle cx="650" cy="120" r="8" fill="url(#neural)"/>
  <circle cx="800" cy="200" r="8" fill="url(#neural)"/>
  <circle cx="950" cy="150" r="8" fill="url(#neural)"/>
  
  <circle cx="250" cy="300" r="8" fill="url(#neural)"/>
  <circle cx="400" cy="250" r="8" fill="url(#neural)"/>
  <circle cx="550" cy="330" r="8" fill="url(#neural)"/>
