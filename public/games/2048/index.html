<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>2048</title>
    <link rel="stylesheet" href="style.css"/>
    <script src="app.js"></script>
</head>
<body>

<div class="container" id="game-container" tabindex="0">
    <div class="info">
        <h1>2048</h1>
        <div class="score-container">
            <p class="score-title">score</p>
            <h2 id="score">0</h2>
        </div>
    </div>
    <p id="result">Join the numbers and get to the <b>2048</b> tile!</p>
    <div class="grid"></div>
    <p class="instructions">👆 点击此处开始游戏 | 使用方向键 ↑↓←→ 移动</p>
</div>

<script>
    // Auto-focus the game container when page loads
    document.addEventListener('DOMContentLoaded', function() {
        const container = document.getElementById('game-container');
        
        // Focus on the container
        container.focus();
        
        // Prevent arrow keys from scrolling the page
        container.addEventListener('keydown', function(e) {
            if([37, 38, 39, 40].indexOf(e.keyCode) > -1) {
                e.preventDefault();
            }
        });
        
        // Also prevent scrolling on window when game has focus
        window.addEventListener('keydown', function(e) {
            if([37, 38, 39, 40].indexOf(e.keyCode) > -1 && document.activeElement === container) {
                e.preventDefault();
            }
        });
        
        // Click to focus
        container.addEventListener('click', function() {
            container.focus();
        });
    });
</script>

</body>
</html>
